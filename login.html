<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SITA | Admin Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000; --accent: #ff3b30; }
        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background: #000; height: 100vh; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
            /* منع السحب لعمل ريفريش في الموبايل */
            overscroll-behavior-y: contain;
        }

        /* تأثير الخلفية الفخم */
        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 1;
        }

        .login-card {
            position: relative; z-index: 2; width: 100%; max-width: 400px;
            padding: 40px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; backdrop-filter: blur(20px);
            text-align: center; color: #fff;
            box-sizing: border-box;
        }

        .login-card h1 {
            font-family: 'Bodoni Moda', serif; font-size: 40px;
            letter-spacing: 8px; margin-bottom: 10px; text-transform: uppercase;
        }

        .login-card p { color: #888; font-size: 14px; margin-bottom: 35px; }

        .input-group { margin-bottom: 20px; text-align: left; position: relative; }
        .input-group label { display: block; font-size: 12px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        
        .input-group input {
            width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: #fff; outline: none; transition: 0.3s; box-sizing: border-box;
            padding-right: 45px; 
            /* التعديل هنا: حجم خط 16px يمنع الزوم التلقائي في الموبايل */
            font-size: 16px; 
        }

        .input-group input:focus { border-color: #fff; background: rgba(255, 255, 255, 0.1); }

        /* ستايل العين */
        .toggle-password {
            position: absolute; right: 15px; color: #666; cursor: pointer;
            transition: 0.3s; z-index: 10; font-size: 18px; /* كبّرنا العين سيكا للموبايل */
        }
        .toggle-password:hover { color: #fff; }

        .login-btn {
            width: 100%; padding: 16px; background: #fff; color: #000;
            border: none; border-radius: 12px; font-weight: 800;
            cursor: pointer; transition: 0.3s; font-size: 15px; margin-top: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        .error-msg { color: var(--accent); font-size: 13px; margin-top: 15px; display: none; }

        /* تعديلات خفيفة للموبايلات الصغيرة */
        @media (max-width: 480px) {
            .login-card { width: 90%; padding: 30px 20px; }
            .login-card h1 { font-size: 32px; letter-spacing: 5px; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="login-card">
    <h1>SITA</h1>
    <p>ADMINISTRATION ACCESS</p>

    <div class="input-group">
        <label>Partner Email</label>
        <input type="email" id="email" placeholder="partner@sita.com" autocomplete="off">
    </div>

    <div class="input-group">
        <label>Secure Password</label>
        <div class="input-wrapper">
            <input type="password" id="password" placeholder="••••••••">
            <i class="fas fa-eye toggle-password" id="toggleEye" onclick="togglePasswordVisibility()"></i>
        </div>
    </div>

    <button class="login-btn" onclick="attemptLogin()">ENTER DASHBOARD</button>
    <div id="error" class="error-msg">Invalid Credentials. Access Denied.</div>
</div>

<script>
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('toggleEye');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    }

    function attemptLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const error = document.getElementById('error');

        const partners = [
            { email: "partner1@sita.com", pass: "Sita2026" },
            { email: "partner2@sita.com", pass: "Sita2026" },
            { email: "partner3@sita.com", pass: "Sita2026" }
        ];

        const isValid = partners.some(p => p.email === email && p.pass === pass);

        if (isValid) {
            sessionStorage.setItem('sita_auth', 'true');
            window.location.replace("admin-sita.html"); 
        } else {
            error.style.display = 'block';
            setTimeout(() => error.style.display = 'none', 3000);
        }
    }

    document.addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') attemptLogin(); 
    });
</script>

</body>
</html>
